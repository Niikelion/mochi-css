name: PR checks
on: [ pull_request ]
jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            -   name: Enable Corepack
                run: corepack enable
            -   uses: actions/checkout@v6
            -   name: Use Node.js 24.x
                uses: actions/setup-node@v6
                with:
                    node-version: '24.x'
                    cache: 'yarn'
            -   name: Install dependencies
                run: yarn install --immutable
            -   name: Build packages
                run: yarn build
            -   name: Save build artifacts
                uses: actions/cache/save@v5
                with:
                    path: packages/*/dist
                    key: build-${{ github.sha }}
    lint:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            -   name: Enable Corepack
                run: corepack enable
            -   uses: actions/checkout@v6
            -   name: Restore build artifacts
                uses: actions/cache/restore@v5
                with:
                    path: packages/*/dist
                    key: build-${{ github.sha }}
            -   name: Use Node.js 24.x
                uses: actions/setup-node@v6
                with:
                    node-version: '24.x'
                    cache: 'yarn'
            -   name: Install dependencies
                run: yarn install --immutable
            -   name: Lint packages
                run: yarn lint
    test:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            -   name: Enable Corepack
                run: corepack enable
            -   uses: actions/checkout@v6
            -   name: Restore build artifacts
                uses: actions/cache/restore@v5
                with:
                    path: packages/*/dist
                    key: build-${{ github.sha }}
            -   name: Use Node.js 24.x
                uses: actions/setup-node@v6
                with:
                    node-version: '24.x'
                    cache: 'yarn'
            -   name: Install dependencies
                run: yarn install --immutable
            -   name: Run tests
                run: yarn test
    changeset:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            -   uses: actions/checkout@v6
            -   name: Check for changeset
                run: |
                    count=$(find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" | wc -l)
                    if [ "$count" -eq 0 ]; then
                        echo "No changeset found. Please add a changeset with 'yarn changeset'."
                        exit 1
                    fi
            -   name: Check tsuki is bumped when suite packages are bumped
                run: |
                    suite_bumped=false
                    tsuki_bumped=false
                    for file in $(find .changeset -maxdepth 1 -name "*.md" ! -name "README.md"); do
                        # Extract content between the first and second --- delimiters (frontmatter)
                        frontmatter=$(awk '/^---$/{if(++n==2) exit} n==1' "$file")
                        if echo "$frontmatter" | grep -q '"@mochi-css/' && ! echo "$frontmatter" | grep -qE '"@mochi-css/tsuki"'; then
                            suite_bumped=true
                        fi
                        if echo "$frontmatter" | grep -q '"@mochi-css/tsuki"'; then
                            tsuki_bumped=true
                        fi
                    done
                    if [ "$suite_bumped" = true ] && [ "$tsuki_bumped" = false ]; then
                        echo "ERROR: mochi-css suite packages are bumped but @mochi-css/tsuki is not included in any changeset."
                        echo "tsuki's mochiPackage() uses its own version to determine which major version to install."
                        echo "Please add a changeset for @mochi-css/tsuki."
                        exit 1
                    fi
                    echo "OK: tsuki bump check passed."